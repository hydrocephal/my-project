name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: irc_user
          POSTGRES_PASSWORD: irc_password
          POSTGRES_DB: irc_chat_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://irc_user:irc_password@localhost:5432/irc_chat_test
          REDIS_URL: redis://localhost:6379
        run: uv run pytest app/tests/

  deploy:
    runs-on: self-hosted
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy
        run: |
          cd /opt/PythonIRC
          git pull origin main
          docker compose up -d --build